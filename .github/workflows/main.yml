name: Build Java Jar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Cache Spigot File
      id: cache-spigot
      uses: actions/cache@v4
      with:
        path: buildtools/spigot-*.jar
        key: spigot-build-1.21.11

    - name: Run BuildTools (Only if not cached)
      if: steps.cache-spigot.outputs.cache-hit != 'true'
      run: |
        mkdir -p buildtools
        cd buildtools
        wget https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar -O BuildTools.jar
        java -jar BuildTools.jar --rev 1.21.11

    - name: Install Spigot & API to local Maven
      run: |
        # Tìm file jar thực tế trong thư mục buildtools
        SPIGOT_JAR=$(ls buildtools/spigot-*.jar | head -n 1)
        echo "Installing $SPIGOT_JAR to local Maven repository..."
        
        # Cài đặt dưới nhãn spigot (Core/NMS)
        mvn install:install-file -Dfile=$SPIGOT_JAR -DgroupId=org.spigotmc -DartifactId=spigot -Dversion=1.21.11-R0.1-SNAPSHOT -Dpackaging=jar
        
        # Cài đặt dưới nhãn spigot-api (Để fix lỗi package org.bukkit does not exist)
        mvn install:install-file -Dfile=$SPIGOT_JAR -DgroupId=org.spigotmc -DartifactId=spigot-api -Dversion=1.21.11-R0.1-SNAPSHOT -Dpackaging=jar

    - name: Download and Install ProtocolLib manually
      run: |
        wget https://github.com/dmulloy2/ProtocolLib/releases/download/5.2.0/ProtocolLib.jar -O ProtocolLib.jar
        mvn install:install-file -Dfile=ProtocolLib.jar -DgroupId=com.comphenix.protocol -DartifactId=ProtocolLib -Dversion=5.2.0 -Dpackaging=jar

    - name: Build with Maven
      run: mvn clean package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LootableCorpses-Jar
        path: target/*.jar