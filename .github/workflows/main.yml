name: Build Java Jar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Spigot 1.21.11 with BuildTools
      run: |
        mkdir buildtools
        cd buildtools
        wget https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
        java -jar BuildTools.jar --rev latest

    - name: Download and Install ProtocolLib manually
      run: |
        wget https://github.com/dmulloy2/ProtocolLib/releases/download/5.2.0/ProtocolLib.jar -O ProtocolLib.jar
        mvn install:install-file -Dfile=ProtocolLib.jar -DgroupId=com.comphenix.protocol -DartifactId=ProtocolLib -Dversion=5.2.0 -Dpackaging=jar

    - name: Build with Maven
      run: mvn clean package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LootableCorpses-Jar
        path: target/*.jar